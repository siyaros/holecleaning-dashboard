<svg width="100%" viewBox="0 0 680 920" role="img" xmlns="http://www.w3.org/2000/svg">
  <title>CleanSight CUC calculation flow with normalization</title>
  <desc>Step-by-step flowchart showing how CleanSight calculates normalized CRR thresholds and BU cycles for hole cleaning assessment</desc>
  
  <style>
    .t { font-family: system-ui, -apple-system, sans-serif; font-size: 14px; fill: #1a1a1a; }
    .ts { font-family: system-ui, -apple-system, sans-serif; font-size: 12px; fill: #4a4a4a; }
    .th { font-family: system-ui, -apple-system, sans-serif; font-size: 14px; fill: #1a1a1a; font-weight: 500; }
    .section { font-family: system-ui, -apple-system, sans-serif; font-size: 13px; fill: #2a2a2a; font-weight: 600; letter-spacing: 0.5px; }
    .formula { font-family: 'SF Mono', 'Consolas', monospace; font-size: 11px; fill: #3a3a3a; }
    .box { fill: #f8f8f8; stroke: #888; stroke-width: 0.5; }
    .box-dark { fill: #e8e8e8; stroke: #666; stroke-width: 0.5; }
    .arr { stroke: #666; stroke-width: 1; fill: none; }
    .leader { stroke: #999; stroke-width: 0.5; stroke-dasharray: 3 2; fill: none; }
  </style>
  
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#666" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <!-- Section 1: Input data -->
  <text class="section" x="40" y="30">1. INPUT DATA (from rig CSV export)</text>
  
  <rect class="box" x="40" y="45" width="145" height="50" rx="4"/>
  <text class="th" x="112" y="65" text-anchor="middle">Hole Depth (m)</text>
  <text class="ts" x="112" y="82" text-anchor="middle">Find TD = MAX</text>
  
  <rect class="box" x="195" y="45" width="145" height="50" rx="4"/>
  <text class="th" x="267" y="65" text-anchor="middle">Lag Depth (m)</text>
  <text class="ts" x="267" y="82" text-anchor="middle">Track BU progress</text>
  
  <rect class="box" x="350" y="45" width="145" height="50" rx="4"/>
  <text class="th" x="422" y="65" text-anchor="middle">CRR (m³/min)</text>
  <text class="ts" x="422" y="82" text-anchor="middle">Cuttings rate</text>
  
  <rect class="box" x="505" y="45" width="135" height="50" rx="4"/>
  <text class="th" x="572" y="65" text-anchor="middle">Time</text>
  <text class="ts" x="572" y="82" text-anchor="middle">Duration calcs</text>

  <!-- Arrow down -->
  <line class="arr" x1="340" y1="95" x2="340" y2="125" marker-end="url(#arrow)"/>

  <!-- Section 2: TD Detection -->
  <text class="section" x="40" y="145">2. TD DETECTION</text>
  
  <rect class="box-dark" x="40" y="160" width="600" height="65" rx="6"/>
  <text class="th" x="340" y="185" text-anchor="middle">Find Total Depth (TD)</text>
  <text class="formula" x="340" y="205" text-anchor="middle">TD = MAX(Hole Depth)  →  TD Time = timestamp when Hole Depth first equals TD</text>

  <!-- Arrow down -->
  <line class="arr" x1="340" y1="225" x2="340" y2="255" marker-end="url(#arrow)"/>

  <!-- Section 3: Reference BU Time -->
  <text class="section" x="40" y="275">3. REFERENCE BU TIME (baseline for normalization)</text>
  
  <rect class="box-dark" x="40" y="290" width="600" height="80" rx="6"/>
  <text class="th" x="340" y="315" text-anchor="middle">Calculate reference bottoms-up time</text>
  <text class="formula" x="340" y="338" text-anchor="middle">Wait for: Lag Depth ≥ (TD - 2m)  →  this marks "first BU complete"</text>
  <text class="formula" x="340" y="355" text-anchor="middle">Ref BU Time (min) = (Lag reaches TD timestamp) - (TD timestamp)</text>

  <!-- Arrow down -->
  <line class="arr" x1="340" y1="370" x2="340" y2="400" marker-end="url(#arrow)"/>

  <!-- Section 4: CRR at TD Capture -->
  <text class="section" x="40" y="420">4. CRR AT TD CAPTURE (baseline for threshold)</text>
  
  <rect class="box-dark" x="40" y="435" width="600" height="65" rx="6"/>
  <text class="th" x="340" y="460" text-anchor="middle">Capture CRR baseline when TD is reached</text>
  <text class="formula" x="340" y="480" text-anchor="middle">CRR_at_TD = CRR value at first row where Hole Depth = TD</text>

  <!-- Arrow down -->
  <line class="arr" x1="340" y1="500" x2="340" y2="530" marker-end="url(#arrow)"/>

  <!-- Section 5: Dynamic Threshold -->
  <text class="section" x="40" y="550">5. DYNAMIC THRESHOLD CALCULATION</text>
  
  <rect class="box-dark" x="40" y="565" width="290" height="80" rx="6"/>
  <text class="th" x="185" y="590" text-anchor="middle">Clean threshold (15%)</text>
  <text class="formula" x="185" y="613" text-anchor="middle">Threshold = CRR_at_TD × 0.15</text>
  <text class="ts" x="185" y="633" text-anchor="middle">85% reduction from baseline</text>
  
  <rect class="box-dark" x="350" y="565" width="290" height="80" rx="6"/>
  <text class="th" x="495" y="590" text-anchor="middle">Normalized CRR</text>
  <text class="formula" x="495" y="613" text-anchor="middle">Norm CRR = CRR / CRR_at_TD</text>
  <text class="ts" x="495" y="633" text-anchor="middle">Ratio: 1.0 at TD → 0.15 = clean</text>

  <!-- Arrow down -->
  <line class="arr" x1="340" y1="645" x2="340" y2="675" marker-end="url(#arrow)"/>

  <!-- Section 6: BU Cycles Calculation -->
  <text class="section" x="40" y="695">6. BU CYCLES CALCULATION</text>
  
  <rect class="box-dark" x="40" y="710" width="600" height="80" rx="6"/>
  <text class="th" x="340" y="735" text-anchor="middle">Calculate BU cycles (normalized time)</text>
  <text class="formula" x="340" y="758" text-anchor="middle">BU Cycles = (Current time - TD time) / Ref BU Time</text>
  <text class="ts" x="340" y="778" text-anchor="middle">Example: 120 min elapsed ÷ 60 min ref BU = 2.0 BU cycles</text>

  <!-- Arrow down -->
  <line class="arr" x1="340" y1="790" x2="340" y2="820" marker-end="url(#arrow)"/>

  <!-- Section 7: Clean Detection -->
  <text class="section" x="40" y="840">7. CLEAN DETECTION (3 criteria must be met)</text>
  
  <rect class="box" x="40" y="855" width="190" height="55" rx="4"/>
  <text class="th" x="135" y="878" text-anchor="middle">First BU complete</text>
  <text class="ts" x="135" y="895" text-anchor="middle">Lag Depth ≥ TD</text>
  
  <rect class="box" x="245" y="855" width="190" height="55" rx="4"/>
  <text class="th" x="340" y="878" text-anchor="middle">CRR below threshold</text>
  <text class="ts" x="340" y="895" text-anchor="middle">CRR ≤ CRR_at_TD × 0.15</text>
  
  <rect class="box" x="450" y="855" width="190" height="55" rx="4"/>
  <text class="th" x="545" y="878" text-anchor="middle">Sustained ≥ 5 min</text>
  <text class="ts" x="545" y="895" text-anchor="middle">Consecutive minutes</text>

  <!-- Connection lines between criteria -->
  <line class="leader" x1="230" y1="882" x2="245" y2="882"/>
  <line class="leader" x1="435" y1="882" x2="450" y2="882"/>
  
  <text class="ts" x="237" y="875" text-anchor="middle">+</text>
  <text class="ts" x="442" y="875" text-anchor="middle">+</text>

</svg>
